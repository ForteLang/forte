<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Forte — compose music as code. The forte "f" has no crossbar of its
       own: the audio waveform passes straight through the stem and plays
       that role, rippling outward as it leaves the letter. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1e24"/>
      <stop offset="1" stop-color="#101216"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)" stroke="#2b2f38" stroke-width="2"/>

  <!-- the f stem: a long italic stroke (no crossbar) -->
  <path d="M 78 24 C 65 20 58 30 55 46 L 46 98 C 43 114 33 122 22 117"
        fill="none" stroke="#e8b34c" stroke-width="9" stroke-linecap="round"/>

  <!-- the crossbar that becomes the waveform: flat through the stem, then audio -->
  <path d="M 24 66 L 58 66 L 63 56 L 70 78 L 76 50 L 83 80 L 89 60 L 93 66 L 104 66"
        fill="none" stroke="#e8b34c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
