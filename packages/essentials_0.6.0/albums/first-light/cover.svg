<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <!-- First Light — the Essentials reference album. Like everything in
       Forte, the cover is source code. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f14"/>
      <stop offset="0.55" stop-color="#1c2030"/>
      <stop offset="0.78" stop-color="#4a3550"/>
      <stop offset="1" stop-color="#c96f3a"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd9a0"/>
      <stop offset="0.6" stop-color="#e8b34c"/>
      <stop offset="1" stop-color="#e8b34c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#sky)"/>
  <circle cx="300" cy="452" r="150" fill="url(#sun)"/>
  <circle cx="300" cy="452" r="58" fill="#f2c063"/>
  <!-- the horizon is a waveform: seven tracks, dawn to night -->
  <g stroke="#0d0f14" stroke-width="3" fill="none" opacity="0.9">
    <path d="M0 452 H600"/>
  </g>
  <g fill="#0d0f14">
    <rect x="0" y="452" width="600" height="148"/>
  </g>
  <g stroke="#e8b34c" stroke-width="2" fill="none" opacity="0.55">
    <path d="M0 500 q 18 -26 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 24 0"/>
    <path d="M0 530 q 25 -14 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0" opacity="0.35"/>
  </g>
  <text x="42" y="86" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="44" font-weight="700" fill="#e8e2d6" letter-spacing="2">FIRST LIGHT</text>
  <text x="44" y="120" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="17" fill="#8a919e" letter-spacing="3">FORTE ESSENTIALS</text>
  <text x="44" y="566" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#566070">seven songs, dawn to night — every sound is code</text>
</svg>
