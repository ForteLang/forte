<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<meta charset="utf-8">
<title>Forte — compose music as code</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: #16181d; color: #d7dae0;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: #1e2128; border-bottom: 1px solid #2b2f38;
  }
  header h1 { font-size: 15px; margin: 0 12px 0 0; letter-spacing: 2px; color: #e8b34c; }
  #logo { width: 26px; height: 26px; margin-right: -4px; }
  button {
    background: #2b2f38; color: #d7dae0; border: 1px solid #3a3f4b;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #353b47; }
  button.primary { background: #e8b34c; color: #16181d; border-color: #e8b34c; font-weight: 600; }
  #status { margin-left: auto; font-size: 12px; color: #8a919e; font-variant-numeric: tabular-nums; }
  select { background: #2b2f38; color: #d7dae0; border: 1px solid #3a3f4b; border-radius: 6px; padding: 5px 8px; font-size: 13px; max-width: 210px; }
  #saved { font-size: 11px; color: #7fbf7f; min-width: 46px; }
  #wrap { flex: 1; display: flex; min-height: 0; }
  #left {
    width: 208px; flex: none; border-right: 1px solid #2b2f38; background: #1a1d23;
    display: flex; flex-direction: column; min-height: 0;
  }
  #tree {
    flex: 1; overflow: auto; padding: 6px 0 10px;
    font: 12px/1.75 ui-monospace, monospace;
  }
  #git {
    flex: none; max-height: 46%; overflow: auto; border-top: 1px solid #2b2f38;
    padding: 8px 10px 10px; font: 12px/1.6 ui-monospace, monospace;
  }
  #git h2 { font-size: 10px; letter-spacing: 1px; color: #8a919e; margin: 0 0 6px; text-transform: uppercase; }
  #git .row { display: flex; gap: 5px; margin-bottom: 6px; }
  #git select {
    flex: 1; min-width: 0; max-width: none; background: #1b1e24;
    border: 1px solid #2b2f38; border-radius: 4px; padding: 3px 6px; font: inherit; color: #d6d9de;
  }
  #git button { padding: 3px 9px; font-size: 12px; }
  #git .cnt { color: #565d69; font-size: 10px; margin-left: 4px; }
  #tree .sec {
    margin: 8px 12px 2px; color: #8a919e; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  #tree .dir { color: #565d69; padding: 0 12px; white-space: nowrap; }
  #tree .projbtns { display: flex; gap: 4px; margin: 4px 10px 6px; }
  #tree .projbtns button { padding: 2px 8px; font-size: 11px; }
  #tree .blk { display: flex; gap: 4px; align-items: center; padding: 0 12px; }
  #tree .blk span { flex: 1; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  #tree .blk button { padding: 0 6px; font-size: 10px; }
  #tree .f {
    padding: 0 12px; color: #a9b0bb; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #tree .f:hover { background: #22262e; }
  #tree .f.cur { background: #2b2f38; color: #e8b34c; }
  #tree .f.asset { color: #6a7280; cursor: default; }
  #tree .f.asset:hover { background: none; }
  #editor-host { flex: 1; min-width: 0; }
  textarea#fallback {
    width: 100%; height: 100%; resize: none; border: 0; outline: none;
    background: #16181d; color: #d7dae0; padding: 12px 16px;
    font: 13px/1.55 ui-monospace, 'SF Mono', Consolas, monospace;
    tab-size: 2; white-space: pre;
  }
  #side {
    width: 340px; border-left: 1px solid #2b2f38; background: #1a1d23;
    display: flex; flex-direction: column;
  }
  #side h2 { font-size: 11px; letter-spacing: 1px; color: #8a919e; margin: 12px 14px 6px; text-transform: uppercase; }
  #diags { flex: 1; overflow: auto; padding: 0 14px 10px; font: 12px/1.5 ui-monospace, monospace; }
  #grid { padding: 0 14px 10px; max-height: 210px; overflow: auto; flex: none; }
  #grid .hint { color: #565d69; font-size: 12px; }
  .grid-row { margin-bottom: 8px; }
  .grid-label {
    display: block; font: 11px ui-monospace, monospace; color: #8a919e;
    margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; cursor: pointer;
  }
  .grid-label:hover { color: #d7dae0; }
  .grid-cells { display: flex; gap: 2px; }
  .grid-cells button {
    padding: 0; width: 16px; height: 16px; font: 10px ui-monospace, monospace;
    border-radius: 3px; border: 1px solid #3a3f4b; background: #22262e; color: #6a7280;
    flex: none;
  }
  .grid-cells button:nth-child(4n+1):not(:first-child) { margin-left: 5px; }
  .grid-cells button.hit { background: #e8b34c; color: #16181d; border-color: #e8b34c; }
  .grid-cells button.acc { background: #f6cd7c; color: #16181d; border-color: #f6cd7c; font-weight: 700; }
  .grid-cells button.ghost { background: #5a4a2a; color: #d7dae0; border-color: #6a5a33; }
  #diags .d { color: #e06c75; margin-bottom: 8px; cursor: pointer; }
  #diags .ok { color: #7fbf7f; }
  #vcs { padding: 0; font: 12px/1.5 ui-monospace, monospace; max-height: 200px; overflow: auto; }
  #vcs-bar { display: flex; gap: 6px; margin-bottom: 8px; }
  #commit-msg { flex: 1; min-width: 0; background: #1b1e24; border: 1px solid #2b2f38; color: #d6d9de; border-radius: 4px; padding: 3px 8px; font: inherit; }
  #vcs-log .commit { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; color: #8a919e; }
  #vcs-log .commit b { color: #d6d9de; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #vcs-log .commit a { color: #6f9fd8; cursor: pointer; }
  #vcs-diff { background: #14161b; border: 1px solid #2b2f38; border-radius: 4px; padding: 8px; margin-top: 6px; white-space: pre-wrap; color: #b6bcc6; max-height: 140px; overflow: auto; }
  #proof { padding: 10px 14px; border-top: 1px solid #2b2f38; font: 11px/1.6 ui-monospace, monospace; color: #8a919e; word-break: break-all; }
  #proof b { color: #e8b34c; }
  #viz-wrap { height: 190px; border-top: 1px solid #2b2f38; background: #14161b; position: relative; }
  #viz { width: 100%; height: 100%; display: block; }
  #viz-hint { position: absolute; top: 6px; right: 12px; font-size: 10px; color: #565d69; }
</style>
</head>
<body>
<header>
  <img id="logo" src="logo.svg" alt=""><h1>FORTE</h1>
  <select id="file" title="song"></select>
  <button id="new">New</button>
  <button id="delete" title="ローカルコピーを削除">Del</button>
  <span id="saved" title="OPFS に自動保存されます"></span>
  <button id="play" class="primary">▶ Play</button>
  <button id="stop">■ Stop</button>
  <button id="rec" title="マイク録音 → 来歴付き .frec として保存">● Rec</button>
  <button id="calib" title="ループバック較正: チャープを再生してマイクで捕まえ、往復レイテンシを実測">⏱ Calib</button>
  <button id="perform" title="演奏モード: MIDI鍵盤 or PCキー(A〜K=白鍵/W,E,T,Y,U=黒鍵)で弾くと、停止時に notes コードに書き起こされます">🎹 Perform</button>
  <button id="digest">Build digest</button>
  <button id="packages" title="導入済み package のカタログ(instruments / blocks / songs を閲覧)">📦 Packages</button>
  <span id="status">loading…</span>
</header>
<div id="wrap">
  <div id="left">
    <div id="tree" title="プロジェクトのファイル。クリックで開きます(現在のファイルは黄色)"></div>
    <div id="git">
      <h2>Git<span id="git-state" class="cnt"></span></h2>
      <div class="row">
        <select id="branch" title="現在のブランチ。選ぶと checkout(未コミットの変更があると拒否)"></select>
        <button id="branch-new" title="現在のコミットから新しいブランチを作って切り替え">＋</button>
      </div>
      <div class="row">
        <select id="merge-from" title="マージ元のブランチ"></select>
        <button id="merge" title="選んだブランチを現在のブランチへマージ(重ならない編集は自動で合流、競合は <<<<<<< マーカー)">⇣</button>
      </div>
      <div id="vcs">
        <div id="vcs-bar">
          <input id="commit-msg" placeholder="コミットメッセージ" spellcheck="false">
          <button id="commit" title="全ローカルファイルをスナップショット">Commit</button>
        </div>
        <div id="vcs-log"></div>
        <pre id="vcs-diff" hidden></pre>
      </div>
    </div>
  </div>
  <div id="editor-host"><textarea id="fallback" spellcheck="false"></textarea></div>
  <div id="side">
    <h2>Diagnostics</h2>
    <div id="diags"><div class="ok">—</div></div>
    <h2 title="beat リテラルをそのまま編集できるグリッド。クリックで - → x → X → . を巡回し、コードに最小diffで書き戻されます">Beat grid</h2>
    <div id="grid"><div class="hint">—</div></div>
    <div id="proof">build digest: <b id="digest-out">—</b><br>
      native/wasip1/browser が同じ値なら、この曲はどこでもビット同一にビルドされる。</div>
  </div>
</div>
<div id="viz-wrap">
  <canvas id="viz"></canvas>
  <span id="viz-hint">drag a clip to re-place it — the code is the source of truth</span>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
